<?xml version="1.0" encoding="UTF-8"?>
<!-- Audio File Analysis Icon – magnifying glass containing waveform -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="800"
     height="800"
     role="img"
     aria-label="Audio file analysis icon, color #EAD685"
     fill="none"
     stroke="#EAD685"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- Magnifying glass lens -->
  <circle cx="28" cy="28" r="18" />

  <!-- Handle -->
  <line x1="40" y1="40" x2="56" y2="56" />

  <!-- Waveform inside lens -->
  <polyline points="16,28 20,24 24,30 28,22 32,26 36,20 40,26"
            stroke-width="2.5" />

</svg>
  
