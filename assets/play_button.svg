<?xml version="1.0" encoding="UTF-8"?>
<!-- Enhanced SVG: unified #99ea85 color, smooth stroke joins, and subtle glow -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="800"
     height="800"
     fill="none"
     stroke="#99ea85"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- Soft green glow -->
  <defs>
    <filter id="soft-green-glow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Slightly lighter green for the glow aura -->
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#b5f3a8" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Outer circular path -->
  <path filter="url(#soft-green-glow)"
        d="M53.92,10.081
           c12.107,12.105,12.107,31.732,0,43.838
           c-12.106,12.108-31.734,12.108-43.839,0
           c-12.107-12.105-12.107-31.732,0-43.838
           C22.186-2.027,41.813-2.027,53.92,10.081z"/>

  <!-- Play button triangle -->
  <polygon points="27,21 41,32 27,43" filter="url(#soft-green-glow)"/>

</svg>

