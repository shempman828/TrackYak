<!DOCTYPE html>
<html>
<head>
    <title>Places Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <!-- Add QWebChannel support -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        :root {
            --accent-color: #8599ea;
            --accent-hover: #a4b3ff;
            --accent-transparent: rgba(133, 153, 234, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #2d2d2d;
        }
        #map {
            height: 100vh;
            width: 100%;
            background-color: #1e1e1e;
            filter: hue-rotate(10deg) brightness(1.1) saturate(1.2);
        }

        /* Dark mode popup styling with accent color */
        .leaflet-popup-content-wrapper {
            background-color: #2d2d2d;
            color: var(--accent-color);
            border-radius: 8px;
            border: 1px solid var(--accent-transparent);
        }

        .leaflet-popup-content {
            color: var(--accent-color);
            font-family: Arial, sans-serif;
            line-height: 1.4;
            margin: 12px 16px;
        }

        .leaflet-popup-tip {
            background-color: #2d2d2d;
            border: 1px solid var(--accent-transparent);
        }

        /* Enhanced popup header */
        .leaflet-popup-content-wrapper h3 {
            color: var(--accent-color);
            margin-top: 0;
            border-bottom: 1px solid var(--accent-transparent);
            padding-bottom: 5px;
        }

        /* Tooltip styling */
        .leaflet-tooltip {
            background-color: #2d2d2d;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 4px;
        }

        .leaflet-tooltip-top:before { border-top-color: var(--accent-color); }
        .leaflet-tooltip-bottom:before { border-bottom-color: var(--accent-color); }
        .leaflet-tooltip-left:before { border-left-color: var(--accent-color); }
        .leaflet-tooltip-right:before { border-right-color: var(--accent-color); }

        /* Custom marker styling with accent border */
        .custom-div-icon {
            background: transparent;
            border: none;
        }

        /* Enhanced zoom controls */
        .leaflet-control-zoom a {
            background-color: #2d2d2d;
            color: var(--accent-color);
            border: 1px solid var(--accent-transparent);
            border-bottom: 1px solid var(--accent-transparent);
        }

        .leaflet-control-zoom a:hover {
            background-color: var(--accent-transparent);
            color: var(--accent-hover);
            border-color: var(--accent-color);
        }

        /* Attribution styling */
        .leaflet-control-attribution {
            background-color: rgba(45, 45, 45, 0.9) !important;
            color: var(--accent-color) !important;
            font-size: 11px;
            border-top: 1px solid var(--accent-transparent);
            border-right: 1px solid var(--accent-transparent);
        }

        .leaflet-control-attribution a {
            color: var(--accent-color) !important;
        }

        .leaflet-control-attribution a:hover {
            color: var(--accent-hover) !important;
        }

        /* Custom scrollbar for popups */
        .leaflet-popup-content-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .leaflet-popup-content-wrapper::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .leaflet-popup-content-wrapper::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        .leaflet-popup-content-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Initialize QWebChannel
        new QWebChannel(qt.webChannelTransport, function(channel) {
            window.pyBridge = channel.objects.pyBridge;
        });

        // Function to handle association button clicks
        window.viewAssociations = function(placeId) {
            if (window.pyBridge) {
                window.pyBridge.handle_js_message(JSON.stringify({
                    type: 'viewAssociations',
                    placeId: placeId
                }));
            } else {
                console.error('WebChannel not initialized');
            }
        };

        // Initialize the map
        var map = L.map('map').setView([{center_lat}, {center_lon}], {zoom});

        // Add dark mode tile layer (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, © <a href="https://carto.com/attributions">CARTO</a>',
            maxZoom: 18,
            subdomains: 'abcd'
        }).addTo(map);

        // Add markers
        {markers_js}

        // Fit bounds to show all markers if we have any
        {bounds_js}
    </script>
</body>
</html>
