<?xml version="1.0" encoding="UTF-8"?>
<!-- Pause icon: unified #ead685 color, thicker strokes, subtle glow -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="800"
     height="800"
     fill="none"
     stroke="#ead685"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- Soft yellow-green glow -->
  <defs>
    <filter id="soft-yellow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#f0ebae" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Outer circular frame -->
  <path filter="url(#soft-yellow-glow)"
        d="M53.92,10.081
           c12.107,12.105,12.107,31.732,0,43.838
           c-12.106,12.108-31.734,12.108-43.839,0
           c-12.107-12.105-12.107-31.732,0-43.838
           C22.186-2.027,41.813-2.027,53.92,10.081z"/>

  <!-- Pause bars -->
  <line x1="25" y1="23" x2="25" y2="41" filter="url(#soft-yellow-glow)"/>
  <line x1="38" y1="23" x2="38" y2="41" filter="url(#soft-yellow-glow)"/>
</svg>

