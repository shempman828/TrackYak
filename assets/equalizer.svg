<?xml version="1.0" encoding="UTF-8"?>
<!-- Refined version: modern line weights, unified color (#EAD685), optional soft background -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="800"
     height="800"
     fill="none"
     stroke="#EAD685"
     stroke-width="2.5"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- Optional background for contrast (comment out if unwanted) -->
  <!-- <rect width="64" height="64" fill="#0B0C10" rx="4" ry="4"/> -->

  <!-- Outer border -->
  <rect x="2" y="2" width="60" height="60" rx="4" ry="4" />

  <!-- Vertical dividers -->
  <line x1="16" y1="10" x2="16" y2="54"/>
  <line x1="32" y1="10" x2="32" y2="54"/>
  <line x1="48" y1="10" x2="48" y2="54"/>

  <!-- Horizontal details -->
  <line x1="10" y1="14" x2="22" y2="14"/>
  <line x1="26" y1="32" x2="38" y2="32"/>
  <line x1="42" y1="50" x2="54" y2="50"/>

</svg>

