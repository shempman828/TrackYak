<?xml version="1.0" encoding="UTF-8"?>
<!-- Skip Backward icon: unified #9385ea color, rounded strokes, subtle violet glow -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="800"
     height="800"
     fill="none"
     stroke="#9385ea"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">

  <defs>
    <filter id="soft-violet-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#b0a7f3" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Outer circular frame -->
  <path filter="url(#soft-violet-glow)"
        d="M53.92,10.081
           c12.107,12.105,12.107,31.732,0,43.838
           c-12.106,12.108-31.734,12.108-43.839,0
           c-12.107-12.105-12.107-31.732,0-43.838
           C22.186-2.027,41.813-2.027,53.92,10.081z"/>

  <!-- Left and center play-triangles -->
  <polygon points="32,43 18,32 32,21" filter="url(#soft-violet-glow)"/>
  <polygon points="52,43 38,32 52,21" filter="url(#soft-violet-glow)"/>

  <!-- Pause bar on the left -->
  <line x1="12" y1="41" x2="12" y2="23" filter="url(#soft-violet-glow)"/>
</svg>

