<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">



  <!-- Outer Record with radial gradient -->
  <defs>
    <radialGradient id="vinylGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8599ea"/>
      <stop offset="100%" stop-color="#5f72c0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#vinylGradient)" stroke="#9999FF" stroke-width="4"/>

  <!-- Record Grooves (slightly thinner for inner circles) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#9999FF" stroke-width="1.5" />
  <circle cx="50" cy="50" r="28" fill="none" stroke="#9999FF" stroke-width="1.5" />
  <circle cx="50" cy="50" r="18" fill="none" stroke="#9999FF" stroke-width="1.2" />

  <!-- Center Label -->
  <circle cx="50" cy="50" r="10" fill="#000000" stroke="#9999FF" stroke-width="1"/>
</svg>


