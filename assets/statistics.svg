<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">

  
  <!-- Bars for library stats -->
  <rect x="30" y="90" width="20" height="50" fill="#99ea85" />
  <rect x="70" y="70" width="20" height="70" fill="#99ea85" />
  <rect x="110" y="50" width="20" height="90" fill="#99ea85" />
  <rect x="150" y="30" width="20" height="110" fill="#99ea85" />

  <!-- Books on top of bars -->
  <rect x="30" y="80" width="20" height="10" fill="#99ea85" />
  <rect x="70" y="60" width="20" height="10" fill="#99ea85" />
  <rect x="110" y="40" width="20" height="10" fill="#99ea85" />
  <rect x="150" y="20" width="20" height="10" fill="#99ea85" />

  <!-- Axes (optional in light grey for contrast) -->
  <line x1="20" y1="140" x2="180" y2="140" stroke="#c5c6c7" stroke-width="2" />
  <line x1="20" y1="20" x2="20" y2="140" stroke="#c5c6c7" stroke-width="2" />

  <!-- Optional dots to indicate counts -->
  <circle cx="40" cy="85" r="3" fill="#99ea85" />
  <circle cx="80" cy="65" r="3" fill="#99ea85" />
  <circle cx="120" cy="45" r="3" fill="#99ea85" />
  <circle cx="160" cy="25" r="3" fill="#99ea85" />
</svg>

