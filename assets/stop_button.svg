<?xml version="1.0" encoding="UTF-8"?>
<!-- Subtle glow version -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="800"
     height="800"
     fill="none"
     stroke="#ea8599"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- Soft, subtle glow using Gaussian blur -->
  <defs>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Blur -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <!-- Apply faint color -->
      <feFlood flood-color="#ea8599" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <!-- Merge with original graphic -->
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle shape -->
  <path filter="url(#soft-glow)"
        d="M53.92,10.081
           c12.107,12.105,12.107,31.732,0,43.838
           c-12.106,12.108-31.734,12.108-43.839,0
           c-12.107-12.105-12.107-31.732,0-43.838
           C22.186-2.027,41.813-2.027,53.92,10.081z"/>

  <!-- Inner square -->
  <rect x="22" y="22" width="20" height="20" filter="url(#soft-glow)"/>

</svg>

